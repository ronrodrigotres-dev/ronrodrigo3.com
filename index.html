<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RON3IA - Núcleo Autónomo TRON</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
background:#000;
font-family:'Orbitron',sans-serif;
color:#fff;
overflow:hidden;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
}

.logo{
font-size:72px;
font-weight:900;
letter-spacing:4px;
animation:neuralCore 6s infinite;
}

@keyframes neuralCore{
0%{text-shadow:0 0 20px #ff0000}
25%{text-shadow:0 0 40px #ff0000}
50%{text-shadow:0 0 30px #ff0000}
75%{text-shadow:0 0 50px #ff0000}
100%{text-shadow:0 0 20px #ff0000}
}

.subtitle{
margin-top:20px;
letter-spacing:3px;
color:#ff2a2a;
opacity:.8;
}

/* PARTICULAS */

.particle{
position:fixed;
width:3px;
height:3px;
background:#ff0000;
border-radius:50%;
box-shadow:0 0 6px #ff0000,0 0 12px rgba(255,0,0,.8);
pointer-events:none;
animation:floatParticle linear infinite;
}

@keyframes floatParticle{
from{transform:translateY(100vh);opacity:0}
10%{opacity:1}
to{transform:translateY(-10vh);opacity:0}
}
</style>
</head>

<body>

<section class="hero">
<div class="logo">RON3IA</div>
<div class="subtitle">SISTEMA AUTÓNOMO ACTIVO</div>
</section>

<script>
function createParticle(){
const p=document.createElement("div");
p.classList.add("particle");
p.style.left=Math.random()*window.innerWidth+"px";
p.style.animationDuration=(4+Math.random()*6)+"s";
document.body.appendChild(p);
setTimeout(()=>{p.remove()},10000);
}
setInterval(createParticle,150);
</script>

</body>
</html>
