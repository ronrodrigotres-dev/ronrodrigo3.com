<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Improved Digital Panel</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #282c34;
            color: white;
            text-align: center;
        }
        .scan-line {
            position: relative;
            overflow: hidden;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            background-size: 200% 100%;
            animation: scan 1.5s linear infinite;
        }
        @keyframes scan {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>
    <div class="scan-line">
        <h2>Welcome to the Improved Digital Panel!</h2>
        <p>This digital panel features a scan-line effect for an enhanced visual experience, alongside an informative description.</p>
    </div>
</body>
</html>
