<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RON3IA | WAR ROOM ELITE</title>
    <style>
        :root {
            --neon-red: #ff3131;  /* Rojo Táctico */
            --deep-black: #050505; /* Negro Absoluto */
            --panel-dark: #0a0a0a; /* Negro Panel */
            --text-grey: #888;
        }

        body {
            background-color: var(--deep-black);
            color: #fff;
            font-family: 'Courier New', Courier, monospace; /* Tipografía Monoespaciada Militar */
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 80px 20px;
            /* DETALLE DE LUJO: Fondo de micro-puntos de radar */
            background-image: radial-gradient(#1a1a1a 1px, transparent 1px);
            background-size: 30px 30px;
            text-align: center;
        }

        /* --- INGENIERÍA DE LUZ: PARPADEO BINARIO (SIN SUAVIZADO) --- */
        @keyframes voltage-spike {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { 
                opacity: 1; 
                text-shadow: 0 0 15px var(--neon-red), 0 0 30px var(--neon-red); 
            }
            20%, 22%, 24%, 55% { 
                opacity: 0; 
                text-shadow: none; 
            }
        }

        @keyframes circuit-fault {
            0%, 12%, 15%, 90%, 93%, 100% { 
                border-color: var(--neon-red); 
                box-shadow: 0 0 15px rgba(255, 49, 49, 0.4); 
            }
            13%, 91% { 
                border-color: #330000; 
                box-shadow: none; 
            }
        }

        /* --- SECCIÓN 1: LA IDENTIDAD (Hero) --- */
        .title {
            font-size: 5.5rem;
            letter-spacing: 15px;
            font-weight: 900;
            margin: 0;
            text-transform: uppercase;
            /* La joya de la corona: Parpadeo asíncrono */
            animation: voltage-spike 4s infinite steps(1);
        }

        .subtitle {
            color: var(--neon-red);
            font-size: 1.1rem;
            letter-spacing: 4px;
            font-weight: 700;
            margin: 25px 0;
            text-transform: uppercase;
        }

        .description {
            max-width: 800px;
            color: var(--text-grey);
            font-size: 0.95rem;
            line-height: 1.8;
            margin-bottom: 50px;
        }

        .hero-nav {
            display: flex;
            gap: 40px;
            margin-bottom: 60px;
            text-transform: uppercase;
        }

        .hero-nav span {
            font-size: 0.7rem;
            letter-spacing: 2px;
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
            color: #666;
            transition: 0.3s;
        }
        .hero-nav span:hover { color: #fff; border-color: var(--neon-red); }

        /* --- SECCIÓN 2: EL GATILLO (Action) --- */
        .hero-btn {
            border: 2px solid var(--neon-red);
            padding: 18px 60px;
            background: transparent;
            color: #fff;
            font-weight: bold;
            letter-spacing: 4px;
            cursor: pointer;
            margin-bottom: 80px;
            font-size: 0.9rem;
            transition: 0.3s;
            /* Parpadeo independiente al título */
            animation: circuit-fault 3.2s infinite steps(1);
        }
        .hero-btn:hover { background: var(--neon-red); color: #000; box-shadow: 0 0 40px var(--neon-red); }

        /* --- SECCIÓN 3: MÉTRICAS VITALES (Score) --- */
        .section-label { 
            color: var(--neon-red); 
            font-size: 0.8rem; 
            letter-spacing: 5px; 
            margin-bottom: 30px; 
            text-transform: uppercase;
        }
        
        .score-circle {
            width: 140px; height: 140px;
            border-radius: 50%;
            border: 8px solid #151515;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.2rem; font-weight: bold;
            margin: 0 auto 90px;
            box-shadow: inset 0 0 30px #000;
            position: relative;
            animation: voltage-spike 5s infinite steps(1);
        }

        /* --- SECCIÓN 4: INTERFAZ DE MANDO (Console) --- */
        .console-container {
            width: 100%; max-width: 900px;
            border: 2px solid var(--neon-red);
            padding: 40px;
            background: #000;
            margin-bottom: 90px;
            text-align: left;
            position: relative;
            /* Parpadeo lento y pesado */
            animation: circuit-fault 6s infinite steps(1);
        }
