<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>RON3IA | War Room</title>
    <style>
        :root {
            --neon-red: #ff3131;
            --dark-bg: #050505;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-transform: uppercase;
        }

        /* --- EFECTO CRT / SCANLINES --- */
        body::before {
            content: " ";
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10;
            background-size: 100% 3px, 9px 100%;
            pointer-events: none;
        }

        /* --- ANIMACIONES NERVIOSAS (STEPS 1) --- */
        @keyframes flicker-heavy {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; text-shadow: 0 0 10px #fff, 0 0 20px var(--neon-red), 0 0 40px #f00; }
            20%, 24%, 55% { opacity: 0; text-shadow: none; }
        }

        @keyframes flicker-soft {
            0%, 42%, 46%, 81%, 85%, 100% { opacity: 1; text-shadow: 0 0 5px var(--neon-red); }
            44%, 83% { opacity: 0.3; text-shadow: none; }
        }

        @keyframes flicker-box {
            0%, 12%, 15%, 90%, 93%, 100% { border-color: var(--neon-red); box-shadow: 0 0 15px var(--neon-red); opacity: 1; }
            13%, 91% { border-color: #300; box-shadow: none; opacity: 0.2; }
        }

        /* --- ELEMENTOS --- */
        .title {
            font-size: 5rem;
            letter-spacing: 1.5rem;
            margin-bottom: 0;
            animation: flicker-heavy 4s infinite steps(1);
        }

        .subtitle {
            color: var(--neon-red);
            font-size: 1rem;
            letter-spacing: 0.3rem;
            margin-bottom: 3rem;
            animation: flicker-soft 5s infinite steps(1) 1s;
        }

        .grid {
            display: flex;
            gap: 20px;
        }

        .box {
            border: 2px solid var(--neon-red);
            padding: 15px 25px;
            font-size: 0.8rem;
            animation: flicker-box 3.5s infinite steps(1);
        }

        /* Desfase de tiempos para asincronía */
        .box:nth-child(2) { animation-duration: 4.2s; animation-delay: 0.5s; }
        .box:nth-child(3) { animation-duration: 2.8s; animation-delay: 1.2s; }

    </style>
</head>
<body>

    <h1 class="title">RON3IA</h1>
    <p class="subtitle">Sistema Autónomo de Optimización</p>

    <div class="grid">
        <div class="box">Diagnóstico Autónomo</div>
        <div class="box">Priorización Financiera</div>
        <div class="box">Ejecución Inteligente</div>
    </div>

</body>
</html>
