<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validación Estratégica | RON3IA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --glow-inner-from: 40px;
            --glow-outer-from: 60px;
            --glow-inner-to: 60px;
            --glow-outer-to: 90px;
        }

        body {
            background: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        @keyframes slideInFade {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes breathingGlow {
            from {
                box-shadow:
                    0 0 var(--glow-inner-from) #ff0000,
                    0 0 var(--glow-outer-from) rgba(255, 0, 0, 0.5);
            }
            to {
                box-shadow:
                    0 0 var(--glow-inner-to) #ff0000,
                    0 0 var(--glow-outer-to) rgba(255, 0, 0, 0.7);
            }
        }

        .validation-panel {
            max-width: 900px;
            width: 100%;
            background: rgba(10, 10, 10, 0.95);
            border: 2px solid #ff0000;
            border-radius: 20px;
            padding: 80px;
            text-align: center;
            position: relative;
            animation: slideInFade 0.6s ease-out,
                       breathingGlow 3.5s infinite alternate;
        }

        .validation-text {
            font-size: 18px;
            line-height: 1.8;
            color: #cccccc;
            margin-bottom: 40px;
            letter-spacing: 0.5px;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
        }

        .validation-highlight {
            display: block;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 5px;
            color: #ffffff;
            margin-top: 50px;
            text-transform: uppercase;
            text-shadow: 
                0 0 20px rgba(255, 0, 0, 0.8),
                0 0 30px rgba(255, 0, 0, 0.6),
                0 0 40px rgba(255, 0, 0, 0.4),
                2px 2px 4px rgba(0, 0, 0, 0.8);
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .validation-panel {
                padding: 40px 20px;
            }

            .validation-highlight {
                font-size: 18px;
                letter-spacing: 2px;
            }
        }
    </style>
</head>
<body>
    <div class="validation-panel">
        <p class="validation-text">
            Tu arquitectura digital ha sido auditada bajo parámetros de GEO (Generative Engine Optimization).
        </p>
        <p class="validation-text">
            Lo que importa ya no es ser visible en buscadores. Lo que importa es ser <strong>citado</strong> por inteligencia artificial.
        </p>
        <span class="validation-highlight">
            ✓ VALIDACIÓN COMPLETADA
        </span>
    </div>
</body>
</html>
