@'
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RON3IA | Consola de Inteligencia Estratégica</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon-red: #ff0000; --bg-dark: #000000; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Orbitron', sans-serif; overflow-x: hidden; }
        .video-background { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: -1; opacity: 0.4; }
        .content { position: relative; z-index: 1; padding: 40px 20px; max-width: 1400px; margin: 0 auto; }
        .logo-text { font-size: clamp(3rem, 8vw, 5rem); font-weight: 900; letter-spacing: 20px; text-align: center; margin-bottom: 10px; }
        .main-subtitle { color: var(--neon-red); font-size: 0.85rem; letter-spacing: 3px; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>
    <video class="video-background" autoplay muted loop playsinline>
        <source src="fondo.mp4" type="video/mp4">
    </video>
    <div class="content">
        <h1 class="logo-text">RON IA</h1>
        <div class="main-subtitle">SISTEMA AUTÓNOMO DE OPTIMIZACIÓN FINANCIERA DIGITAL</div>
        <p style="text-align:center; color:#888;">Video funcionando ✅</p>
    </div>
</body>
</html>
'@ | Set-Content -Path index.html -Encoding UTF8
