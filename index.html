<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RON3IA | Sistema de Optimización</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Fira+Code:wght@300;500&display=swap" rel="stylesheet">
<style>
/* --- CONFIGURACIÓN BASE --- */
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#050505;
  font-family:'Orbitron',sans-serif;
  color:#fff;
  overflow-x:hidden;
  cursor: none; /* OCULTAMOS EL CURSOR POR DEFECTO PARA EL SNIPER */
}
/* --- CURSOR DE FRANCOTIRADOR --- */
.sniper-cursor {
    position: fixed;
    top: 0; left: 0;
    width: 20px; height: 20px;
    border: 1px solid rgba(255, 0, 0, 0.6);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 99999;
    transition: width 0.2s, height 0.2s, background-color 0.2s, border-color 0.2s;
    mix-blend-mode: difference;
}
.sniper-dot {
    position: fixed;
    top: 0; left: 0;
    width: 4px; height: 4px;
    background-color: red;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 100000;
}
/* Estado Lock-on (Hover) */
.sniper-cursor.locked {
    width: 40px; height: 40px;
    border: 2px solid #00FF00; /* Verde Táctico */
    background-color: rgba(0, 255, 0, 0.1);
    animation: rotateLock 0.3s ease-out forwards;
}
@keyframes rotateLock {
    0% { transform: translate(-50%, -50%) rotate(0deg); }
    100% { transform: translate(-50%, -50%) rotate(45deg); }
}
/* --- EFECTOS DE FONDO --- */
body::after{
  content:"";
  position:fixed; inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px);
  pointer-events:none; z-index:9000;
}
.ambient-glow{
  position:fixed; inset:0;
  background:radial-gradient(ellipse at 50% 30%, rgba(255,0,0,0.05) 0%, transparent 80%);
  animation:ambientPulse 6s ease-in-out infinite;
  pointer-events:none; z-index:0;
}
/* --- SECCIÓN HERO --- */
.hero{
  min-height:80vh;
  text-align:center;
  display:flex; flex-direction:column;
  justify-content:center;
  padding:60px 20px;
  position:relative;
  border-bottom: 1px solid rgba(255,0,0,0.2);
}
.logo{
  font-size:clamp(50px, 10vw, 120px);
  font-weight:900; letter-spacing:10px;
  text-shadow:0 0 20px #ff0000;
  animation:glowPulse 4s infinite;
}
.subtitle{
  color:#ff1a1a; letter-spacing:4px;
  font-size:clamp(12px, 2vw, 20px);
  margin-top:20px;
}
.description{
  max-width:700px; margin:30px auto;
  color:#aaa; font-size:14px; line-height:1.6;
}
/* --- SECCIÓN MATRIZ DE SERVICIOS (LOS 6 BOTONES) --- */
.services-section {
    padding: 80px 20px;
    max-width: 1200px;
    margin: 0 auto;
}
.services-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 30px;
}
.service-card {
    background: rgba(10, 10, 10, 0.8);
    border: 1px solid rgba(255, 0, 0, 0.3);
    padding: 30px;
    position: relative;
    transition: all 0.3s ease;
    cursor: none; /* Importante para el sniper */
}
.service-card:hover {
    border-color: #ff0000;
    box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
    transform: translateY(-5px);
}
.service-title {
    color: #ff0000;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 10px;
    text-transform: uppercase;
}
.service-sub {
    color: #666;
    font-size: 11px;
    letter-spacing: 1px;
}
/* Decoración de esquina */
.service-card::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 0; height: 0;
    border-style: solid;
    border-width: 0 20px 20px 0;
    border-color: transparent #ff0000 transparent transparent;
    opacity: 0.5;
}
/* --- MODAL TERMINAL (HACKER) --- */
.modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(5px);
    z-index: 10000;
    align-items: center; justify-content: center;
}
.terminal-window {
    width: 90%; max-width: 600px;
    background: #000;
    border: 1px solid #ff0000;
    box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
    font-family: 'Fira Code', monospace;
    padding: 0;
    position: relative;
}
.terminal-header {
    background: rgba(255, 0, 0, 0.1);
    padding: 10px 15px;
    border-bottom: 1px solid #ff0000;
    display: flex; justify-content: space-between;
    align-items: center;
}
.terminal-title { color: #ff0000; font-size: 12px; letter-spacing: 2px; }
.close-btn { color: #555; cursor: pointer; font-size: 14px; }
.close-btn:hover { color: #fff; }
.terminal-body { padding: 30px; color: #00FF00; }
.command-line { margin-bottom: 20px; font-size: 14px; min-height: 20px; }
.input-group { margin-bottom: 15px; display: none; /* Oculto hasta que termine la animación */ }
.input-label { color: #ff0000; display: block; margin-bottom: 5px; font-size: 12px; }
.hacker-input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid #333;
    color: #fff;
    font-family: 'Fira Code', monospace;
    font-size: 16px;
    padding: 5px 0;
    outline: none;
}
.hacker-input:focus { border-bottom-color: #00FF00; }
.hacker-input.valid { color: #00FF00; border-bottom-color: #00FF00; }
.terminal-actions {
    margin-top: 30px;
    display: none; /* Oculto al inicio */
}
.btn-execute {
    width: 100%;
    background: #ff0000;
    color: #000;
    border: none;
    padding: 15px;
    font-family: 'Orbitron', sans-serif;
    font-weight: bold;
    letter-spacing: 3px;
    cursor: none;
}
.btn-execute:hover { background: #fff; box-shadow: 0 0 15px #fff; }
/* --- SCORE SECTION (MEJORADA) --- */
.score-section{
  padding:100px 20px; text-align:center;
  background:linear-gradient(180deg,#0a0a0a 0%,#0d0000 50%,#0a0a0a 100%);
}
.score-ring{
  width:220px; height:220px;
  border-radius:50%;
  border:3px solid #333;
  margin:0 auto;
  display:flex; align-items:center; justify-content:center;
  position:relative;
  box-shadow: 0 0 20px rgba(255,0,0,0.1);
}
.score-value{
  font-size:60px; font-weight:900;
  text-shadow:0 0 20px rgba(255,0,0,0.5);
}
.score-label{
  margin-top:20px; color:#555; letter-spacing:3px; font-size:12px;
}
/* --- ANIMACIONES GENERALES --- */
@keyframes ambientPulse{ 0%,100%{opacity:.3} 50%{opacity:.8} }
@keyframes glowPulse{ 0%,100%{text-shadow:0 0 15px #ff0000} 50%{text-shadow:0 0 30px #ff0000} }
/* --- RESPONSIVE --- */
@media(max-width:768px){
    .logo{font-size: 60px;}
    .services-grid{ grid-template-columns: 1fr; }
    .sniper-cursor, .sniper-dot { display: none; } /* En móvil se usa el dedo */
    body { cursor: auto; }
}
</style>
</head>
<body>
<div class="ambient-glow"></div>
<div class="sniper-cursor"></div>
<div class="sniper-dot"></div>
<section class="hero">
  <h1 class="logo">RON3IA</h1>
  <h2 class="subtitle">SISTEMA AUTÓNOMO DE OPTIMIZACIÓN</h2>
  <p class="description">Detecta ineficiencias financieras en tu ecosistema digital.</p>
</section>
<section class="services-section">
    <div class="services-grid" id="serviceGrid">
        </div>
</section>
<section class="score-section">
  <h3 class="subtitle">SCORE DE SALUD DIGITAL</h3>
  <br>
  <div class="score-ring" id="scoreRing">
    <span class="score-value" id="scoreDisplay">--</span>
  </div>
  <p class="score-label" id="scoreLabel">ESPERANDO DIAGNÓSTICO</p>
</section>
<div class="modal-overlay" id="hackerModal">
    <div class="terminal-window">
        <div class="terminal-header">
            <span class="terminal-title" id="modalTitle">/// TERMINAL</span>
            <span class="close-btn" onclick="closeModal()">[X]</span>
        </div>
        <div class="terminal-body">
            <div class="command-line" id="typewriterArea"></div>

            <div class="input-group" id="inputArea">
                <label class="input-label">/// TARGET URL:</label>
                <input type="text" class="hacker-input interactive" id="inputUrl" placeholder="www.tuexcelencia.com">
                <br><br>
                <label class="input-label">/// COMMS CHANNEL (EMAIL):</label>
                <input type="email" class="hacker-input interactive" id="inputEmail" placeholder="ceo@empresa.com">
            </div>
            <div class="terminal-actions" id="actionArea">
                <button class="btn-execute interactive" id="btnExecute">
                    [ > EJECUTAR COMANDO ]
                </button>
            </div>

            <div id="loadingSequence" style="display:none; margin-top:20px; font-size:12px; color:#555;">
                > ESTABLECIENDO ENLACE ENCRIPTADO...<br>
                > VERIFICANDO INTEGRIDAD DE PAQUETES...
            </div>
        </div>
    </div>
</div>
<div style="text-align:center; padding:50px; color:#333; font-size:10px;">
    RONRODRIGO3.COM © 2026 // SECURE PROTOCOL
</div>
<script>
// --- 1. CONFIGURACIÓN DE LOS 6 SERVICIOS (DATA) ---
const services = [
    {
        title: "AUDITORÍA ESTRATÉGICA AUTÓNOMA™",
        sub: "Detección de fugas de margen.",
        cmd: "> RUN FULL_SCAN --target [URL] --report_to [EMAIL]"
    },
    {
        title: "INGENIERÍA DE CONVERSIÓN (CRO)",
        sub: "Incremento directo en rentabilidad.",
        cmd: "> DETECT FRICTION_POINTS --url [URL] --alert [EMAIL]"
    },
    {
        title: "SEO DE ARQUITECTURA ESTRATÉGICA",
        sub: "Reducción de dependencia publicitaria.",
        cmd: "> MAP_SEARCH_VISIBILITY --domain [URL] --user [EMAIL]"
    },
    {
        title: "GROWTH & SEM INTELIGENTE",
        sub: "Mejor asignación de capital digital.",
        cmd: "> OPTIMIZE AD_SPEND --target [URL] --contact [EMAIL]"
    },
    {
        title: "ARQUITECTURA E-COMMERCE ESCALABLE",
        sub: "Reducción de riesgo operativo.",
        cmd: "> TEST INFRASTRUCTURE --store [URL] --admin [EMAIL]"
    },
    {
        title: "TRANSFORMACIÓN DIGITAL AUTÓNOMA",
        sub: "Escalabilidad sin aumentar costos.",
        cmd: "> INIT AUTOPILOT --system [URL] --access [EMAIL]"
    }
];
// --- 2. RENDERIZAR LA MATRIZ DE BOTONES ---
const grid = document.getElementById('serviceGrid');
services.forEach((srv, index) => {
    const card = document.createElement('div');
    card.className = 'service-card interactive'; // 'interactive' activa el sniper
    card.innerHTML = `
        <div class="service-title">${srv.title}</div>
        <div class="service-sub">${srv.sub}</div>
    `;
    card.onclick = () => openModal(index);
    grid.appendChild(card);
});
// --- 3. LÓGICA DEL SNIPER CURSOR ---
const cursor = document.querySelector('.sniper-cursor');
const dot = document.querySelector('.sniper-dot');
document.addEventListener('mousemove', (e) => {
    // Mover el cursor y el punto
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
    dot.style.left = e.clientX + 'px';
    dot.style.top = e.clientY + 'px';
});
// Detectar elementos interactivos dinámicamente
document.body.addEventListener('mouseover', (e) => {
    if (e.target.closest('.interactive') || e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') {
        cursor.classList.add('locked');
    } else {
        cursor.classList.remove('locked');
    }
});
// --- 4. LÓGICA DEL MODAL HACKER ---
const modal = document.getElementById('hackerModal');
const typeArea = document.getElementById('typewriterArea');
const inputArea = document.getElementById('inputArea');
const actionArea = document.getElementById('actionArea');
const modalTitle = document.getElementById('modalTitle');
let typeInterval;
function openModal(index) {
    modal.style.display = 'flex';
    inputArea.style.display = 'none';
    actionArea.style.display = 'none';
    document.getElementById('loadingSequence').style.display = 'none';

    const data = services[index];
    modalTitle.innerText = "/// PROTOCOL: " + data.title;
    typeArea.innerText = "";

    // Efecto Typewriter
    let text = data.cmd;
    let i = 0;
    clearInterval(typeInterval);
    typeInterval = setInterval(() => {
        typeArea.innerText += text.charAt(i);
        i++;
        if (i > text.length - 1) {
            clearInterval(typeInterval);
            showInputs();
        }
    }, 30); // Velocidad de escritura
}
function showInputs() {
    inputArea.style.display = 'block';
    actionArea.style.display = 'block';
    document.getElementById('inputUrl').focus();
}
function closeModal() {
    modal.style.display = 'none';
}
// Validación visual del email (Dopamina)
document.getElementById('inputEmail').addEventListener('input', function(e) {
    if(e.target.value.includes('@') && e.target.value.includes('.')) {
        e.target.classList.add('valid');
    } else {
        e.target.classList.remove('valid');
    }
});
// Simular Ejecución
document.getElementById('btnExecute').onclick = () => {
    actionArea.style.display = 'none';
    inputArea.style.display = 'none';
    document.getElementById('loadingSequence').style.display = 'block';

    setTimeout(() => {
        alert("/// COMANDO ENVIADO.\n\nEl sistema RON3IA ha iniciado el análisis. Recibirás el reporte encriptado en tu correo.");
        closeModal();
        simulateScoreUpdate(); // Disparar la animación del score
    }, 2000);
};
// --- 5. ANIMACIÓN REAL DEL SCORE ---
function simulateScoreUpdate() {
    const scoreDisplay = document.getElementById('scoreDisplay');
    const ring = document.getElementById('scoreRing');
    const label = document.getElementById('scoreLabel');

    let currentScore = 0;
    // Generamos un número aleatorio entre 40 y 85 para simular realismo
    const finalScore = Math.floor(Math.random() * (85 - 45 + 1) + 45);

    label.innerText = "CALCULANDO VECTORES...";
    label.style.color = "#ff0000";
    ring.style.boxShadow = "0 0 50px #ff0000";
    const interval = setInterval(() => {
        currentScore++;
        scoreDisplay.innerText = currentScore + "/100";

        if(currentScore >= finalScore) {
            clearInterval(interval);
            label.innerText = "DIAGNÓSTICO PRELIMINAR COMPLETADO";
            label.style.color = "#00FF00";
            ring.style.borderColor = finalScore > 60 ? "#ff0000" : "#ffaa00";
        }
    }, 30); // Velocidad del contador
}
</script>
</body>
</html>
