@'
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RON3IA | Consola de Inteligencia Estratégica</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon-red: #ff0000; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Orbitron', sans-serif; overflow-x: hidden; }
        .video-background { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: -1; opacity: 0.5; }
        .content { position: relative; z-index: 1; padding: 20px; max-width: 1400px; margin: 0 auto; }
        .logo-wrapper { text-align: center; padding: 40px 20px; }
        .logo-container { position: relative; display: inline-block; }
        .logo-container::before { content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 150%; height: 150%; background: radial-gradient(circle, rgba(255, 0, 0, 0.6) 0%, transparent 70%); filter: blur(60px); z-index: 0; animation: pulse-glow 3s ease-in-out infinite; }
        @keyframes pulse-glow { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; } }
        @keyframes flicker { 0%, 19.9%, 22%, 62.9%, 64%, 64.9%, 70%, 100% { opacity: 1; } 20%, 21.9%, 63%, 63.9%, 65%, 69.9% { opacity: 0.5; } }
        .logo-text { font-size: clamp(3.5rem, 10vw, 7rem); font-weight: 900; letter-spacing: 18px; margin: 0; position: relative; z-index: 1; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.9), 0 0 20px #ff0000, 0 0 40px #ff0000, 0 0 60px #ff0000; animation: flicker 5s infinite; }
        .main-subtitle { color: #ff0000; font-size: 0.85rem; letter-spacing: 3px; text-align: center; margin-bottom: 20px; }
        .main-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; margin: 40px 0; }
        .score-box { background: rgba(0,0,0,0.85); border: 2px solid #ff0000; border-radius: 15px; padding: 30px; text-align: center; }
        .console-box { background: rgba(0,0,0,0.85); border: 2px solid #ff0000; border-radius: 15px; padding: 30px; }
        .console-textarea { width: 100%; background: #000; border: 1px solid #333; color: #fff; font-family: 'Courier New', monospace; padding: 20px; border-radius: 8px; resize: none; height: 150px; margin-bottom: 20px; }
        .console-btn { width: 100%; background: #ff0000; border: none; color: #fff; padding: 15px; font-family: 'Orbitron', sans-serif; font-weight: 900; cursor: pointer; text-transform: uppercase; border-radius: 8px; }
        @media (max-width: 1024px) { .main-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <video class="video-background" autoplay muted loop playsinline>
        <source src="fondo.mp4" type="video/mp4">
    </video>
    <div class="content">
        <div class="logo-wrapper">
            <div class="logo-container">
                <h1 class="logo-text">RON3IA</h1>
            </div>
        </div>
        <div class="main-subtitle">SISTEMA AUTÓNOMO DE OPTIMIZACIÓN FINANCIERA DIGITAL</div>
        <div class="main-grid">
            <div class="score-box">
                <h3 style="color:#ff0000;margin-bottom:20px;">SCORE DIGITAL</h3>
                <div style="font-size:3rem;font-weight:900;">--/100</div>
            </div>
            <div class="console-box">
                <h3 style="color:#ff0000;margin-bottom:20px;">⚡ CONSOLA ESTRATÉGICA</h3>
                <textarea class="console-textarea" placeholder="Describe tu desafío de negocio o pega la URL del sitio..."></textarea>
                <button class="console-btn">INICIAR AUDITORÍA</button>
            </div>
        </div>
    </div>
</body>
</html>
'@ | Set-Content -Path index.html -Encoding UTF8
