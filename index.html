<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RON3IA | Sistema Autónomo</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:#000;
    font-family:'JetBrains Mono', monospace;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:520px;
    padding:50px;
    background:#070707;
    border:2px solid #ff0000;
    border-radius:10px;
    box-shadow:0 0 40px #ff0000;
    text-align:center;
}

h1{
    color:#ff0000;
    letter-spacing:2px;
    margin-bottom:10px;
}

.subtitle{
    color:#777;
    font-size:12px;
    margin-bottom:40px;
    letter-spacing:2px;
}

.score-gauge{
    width:170px;
    height:170px;
    border-radius:50%;
    background:conic-gradient(#ff0000 0%, #1a1a1a 0%);
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0 auto 40px auto;
    transition:1.5s ease;
}

.score-inner{
    width:130px;
    height:130px;
    background:#000;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

#score-number{
    font-size:28px;
    font-weight:bold;
    text-shadow:0 0 10px #ff0000;
}

.label{
    font-size:10px;
    color:#666;
}

input{
    width:100%;
    padding:14px;
    margin:10px 0;
    background:#000;
    border:1px solid #ff0000;
    color:white;
    text-align:center;
}

.neon-button{
    width:100%;
    padding:18px;
    margin-top:20px;
    background:#8b0000;
    border:2px solid #ff0000;
    color:white;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 0 20px #ff0000;
    transition:0.3s ease;
    position:relative;
    overflow:hidden;
}

.neon-button:hover{
    box-shadow:0 0 35px #ff0000;
}

#BTN-glow{
    position:absolute;
    left:0;
    top:0;
    height:100%;
    width:0%;
    background:linear-gradient(90deg, rgba(255,0,0,0.7), rgba(255,0,0,0.1));
    box-shadow:0 0 30px #ff0000;
    z-index:1;
}

#btn-text{
    position:relative;
    z-index:2;
}

.results{
    margin-top:25px;
    font-size:12px;
    display:none;
    text-align:left;
    border-top:1px solid #222;
    padding-top:15px;
}

</style>
</head>
<body>

<div class="card">

<h1>RON3IA CORE</h1>
<div class="subtitle">SISTEMA AUTÓNOMO DE AUDITORÍA ESTRATÉGICA</div>

<div class="score-gauge" id="gauge">
    <div class="score-inner">
        <span id="score-number">--</span>
        <span class="label">SCORE</span>
    </div>
</div>

<input type="email" id="email" placeholder="EMAIL CORPORATIVO">
<input type="text" id="url" placeholder="URL DEL SITIO (ej. empresa.com)">

<button class="neon-button" onclick="ejecutarAuditoria()">
    <div id="BTN-glow"></div>
    <span id="btn-text">INICIAR DIAGNÓSTICO</span>
</button>

<div id="results-box" class="results">
    <div id="metrics-content"></div>
</div>

</div>

<script>

async function ejecutarAuditoria(){

    const email = document.getElementById("email").value;
    const url = document.getElementById("url").value;
    const gauge = document.getElementById("gauge");
    const scoreNum = document.getElementById("score-number");
    const btnGlow = document.getElementById("BTN-glow");
    const btnText = document.getElementById("btn-text");

    if(!email || !url){
        alert("Email y URL requeridos.");
        return;
    }

    btnText.innerText = "ANALIZANDO...";
    btnGlow.style.width = "0%";

    let progress = 0;

    const interval = setInterval(()=>{
        progress += 4;
        btnGlow.style.width = progress + "%";
        if(progress >= 95) clearInterval(interval);
    },80);

    try{

        const response = await fetch("https://ron3ia-api-819648047297.southamerica-west1.run.app/analizar-sitio",{
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body:JSON.stringify({ email:email, url:url })
        });

        const data = await response.json();

        clearInterval(interval);
        btnGlow.style.width = "100%";

        if(data.status === "success"){

            const score = data.health_score.score;

            gauge.style.background =
            `conic-gradient(#ff0000 ${score}%, #1a1a1a 0%)`;

            scoreNum.innerText = score;

            btnText.innerText = "DIAGNÓSTICO COMPLETADO";

            document.getElementById("results-box").style.display="block";

            document.getElementById("metrics-content").innerHTML = `
                <p>SEO: ${data.metrics.seo}</p>
                <p>CRO: ${data.metrics.cro}</p>
                <p>ROI PROYECTADO: ${data.metrics.roi_proyectado}</p>
                <p style="font-size:9px;color:#444;margin-top:10px;">
                ID: ${data.audit_id}
                </p>
            `;
        }

    }catch(e){
        btnText.innerText = "ERROR";
        btnGlow.style.width = "0%";
    }
}

</script>

</body>
</html>
