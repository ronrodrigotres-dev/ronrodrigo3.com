<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RON3IA</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
/* === TU FORMATO ORIGINAL (SIN CAMBIOS) === */
*{margin:0;padding:0;box-sizing:border-box}
body{ background:#0a0a0a; font-family:'Orbitron',sans-serif; color:#fff; overflow-x:hidden; cursor:none; }
body::after{ content:""; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px); pointer-events:none; z-index:9999; }
.ambient-glow{ position:fixed; inset:0; background:radial-gradient(ellipse at 50% 30%, rgba(255,0,0,0.04) 0%, transparent 70%); animation:ambientPulse 6s ease-in-out infinite; pointer-events:none; z-index:0; }

/* === CURSOR SNIPER ORIGINAL === */
.sniper-cursor{ position:fixed;top:0;left:0; width:22px;height:22px; border:1.5px solid rgba(255,0,0,0.7); border-radius:50%; transform:translate(-50%,-50%); pointer-events:none; z-index:100000; transition:all .2s; mix-blend-mode:difference; }
.sniper-dot{ position:fixed;top:0;left:0; width:4px;height:4px; background:#ff0000; border-radius:50%; transform:translate(-50%,-50%); pointer-events:none; z-index:100001; box-shadow:0 0 6px #ff0000; }
.sniper-cursor.locked{ width:40px;height:40px; border:2px solid #00FF00; background-color:rgba(0,255,0,0.08); border-radius:2px; animation:rotateLock .3s ease-out forwards; }
@keyframes rotateLock{ 0%{transform:translate(-50%,-50%) rotate(0deg)} 100%{transform:translate(-50%,-50%) rotate(45deg)} }

/* === MATRIZ DE SERVICIOS (FORMATO ORIGINAL + MEJORA DE TAMAÑO Y OVERLAY) === */
.services-section{ padding:80px 20px; max-width:1400px; margin:0 auto; }
.services-grid{ display:grid; grid-template-columns:repeat(auto-fit, minmax(400px, 1fr)); gap:25px; }
.service-card{ 
    background:rgba(0,0,0,0.6); 
    border:1px solid rgba(255,0,0,0.25); 
    padding:70px 40px; /* Tamaño aumentado como pediste */
    position:relative; 
    transition:all .3s ease; 
    cursor:none; 
    overflow:hidden;
}
.service-card:hover{ border-color:#ff0000; box-shadow:0 0 20px rgba(255,0,0,0.2); transform:translateY(-4px); }

/* Pantalla de descripción (Overlay) */
.service-overlay{
    position:absolute; inset:0; background:#000; border:1px solid #ff0000; padding:25px;
    display:flex; flex-direction:column; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity .3s ease; z-index:10;
}
.service-card:hover .service-overlay{ opacity:1; pointer-events:auto; }
.overlay-content b{ color:#ff0000; font-size:11px; display:block; margin-top:8px; }
.overlay-content p{ color:#ccc; font-size:12px; line-height:1.4; margin-bottom:5px; }

/* === CÍRCULO DE VELOCIDAD DE PENSAMIENTO === */
.speed-ring-container { width: 180px; height: 180px; margin: 20px auto; position: relative; display: none; }
.speed-ring { position: absolute; inset: 0; border: 3px solid #111; border-top: 3px solid #ff0000; border-radius: 50%; animation: ringSpin 0.7s linear infinite; }
@keyframes ringSpin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
.speed-value { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }

/* === ESTILOS DE CIERRE ORIGINALES === */
.dashboard{ display:none; margin-top:40px; text-align:center; }
.alert-box{ margin-top:25px; padding:15px 20px; border:2px solid #ff0000; color:#ff0000; font-weight:700; animation:f1 3s infinite; }
@keyframes f1{ 0%,100%{opacity:1} 50%{opacity:0.5} }
</style>
</head>
<body>

<div class="ambient-glow"></div>
<div class="sniper-cursor"></div>
<div class="sniper-dot"></div>

<section style="min-height:100vh; display:flex; flex-direction:column; justify-content:center; text-align:center;">
  <h1 style="font-size:clamp(60px, 12vw, 130px); letter-spacing:14px; text-shadow:0 0 15px #ff0000;">RON3IA</h1>
  <h2 style="color:#ff1a1a; margin-top:20px; letter-spacing:4px;">AUDITORÍA SEO, CRO Y ESTRATEGIAS DE CRECIMIENTO DIGITAL</h2>
  <a href="#consola" style="display:inline-block; margin-top:40px; padding:20px 60px; border:2px solid #ff0000; color:#fff; text-decoration:none; box-shadow:0 0 15px #ff0000;">EJECUTAR AUDITORÍA</a>
</section>

<section class="services-section">
  <h3 style="text-align:center; color:#ff1a1a; margin-bottom:50px; letter-spacing:5px;">MATRIZ DE SERVICIOS</h3>
  <div class="services-grid" id="serviceGrid"></div>
</section>

<section id="consola" style="padding:80px 20px; max-width:900px; margin:0 auto;">
  <div style="border:1px solid #333; padding:40px; background:rgba(0,0,0,0.8); text-align:center;">
    <div id="analysisForm">
        <input type="text" id="analysisUrl" placeholder="INGRESA URL..." style="width:100%; padding:15px; background:#000; border:1px solid #ff0000; color:#fff; margin-bottom:20px;">
        <button id="btnDiagnostico" style="width:100%; padding:15px; background:#ff0000; border:none; color:#000; font-weight:900;">ACTIVAR DIAGNÓSTICO IA</button>
    </div>

    <div class="speed-ring-container" id="speedRing">
        <div class="speed-ring"></div>
        <div class="speed-value">
            <div id="livePct" style="font-size:40px; font-weight:900; color:#ff0000;">0%</div>
            <div style="font-size:9px; color:#555; letter-spacing:1px;">PENSAMIENTO RON3IA</div>
        </div>
    </div>

    <div class="dashboard" id="dashboard">
      <div style="font-size:60px; font-weight:900; color:#ff0000;">64/100</div>
      <div class="alert-box">⚠ RIESGO DE ESTANCAMIENTO COMPETITIVO</div>
    </div>
  </div>
</section>

<script>
const services = [
  { 
    title: "1️⃣ Auditoría Digital Estratégica",
    process: "Identificamos fricciones, dependencias y oportunidades críticas en tu ecosistema digital.",
    reward: "Obtienes claridad estructural y dirección inmediata.",
    neuro: "Alivio de la incertidumbre (Reducción de Cortisol)."
  },
  { 
    title: "2️⃣ Optimización de Conversión (CRO)",
    process: "Mejoramos la arquitectura de decisión de tu sitio para convertir más con el mismo tráfico.",
    reward: "Más eficiencia. Más rendimiento.",
    neuro: "Recompensa por ganancia incremental (Dopamina por eficiencia)."
  },
  { 
    title: "3️⃣ SEO de Arquitectura y Posicionamiento",
    process: "Construimos una base sólida alineada con intención de búsqueda real para crecer orgánicamente.",
    reward: "Seguridad y autoridad ante el mercado.",
    neuro: "Estabilidad y protección (Oxitocina)."
  },
  { 
    title: "4️⃣ Growth & Optimización de Campañas",
    process: "Optimizamos segmentación, estructura y coherencia anuncio-landing.",
    reward: "Control absoluto sobre el retorno de inversión.",
    neuro: "Placer por el control y la optimización de recursos."
  },
  { 
    title: "5️⃣ Arquitectura E-commerce Escalable",
    process: "Reducimos fricción, reorganizamos navegación y fortalecemos estructura.",
    reward: "Un sistema fluido y preparado para escalar.",
    neuro: "Reducción de carga cognitiva (Alivio mental)."
  },
  { 
    title: "6️⃣ Reestructuración Digital Estratégica",
    process: "Redefinimos tu modelo digital con un roadmap claro, alineado con rentabilidad.",
    reward: "Un modelo de negocio eficiente, predecible y competitivo.",
    neuro: "Sensación de dominio y liderazgo estratégico."
  }
];

const grid = document.getElementById('serviceGrid');
services.forEach(s => {
  grid.innerHTML += `
    <div class="service-card">
      <div style="color:#ff0000; font-weight:900; font-size:15px;">${s.title}</div>
      <div class="service-overlay">
        <div class="overlay-content">
          <b>EL PROCESO:</b> <p>${s.process}</p>
          <b>LA RECOMPENSA:</b> <p>${s.reward}</p>
          <b>GATILLO NEURO:</b> <p>${s.neuro}</p>
        </div>
      </div>
    </div>
  `;
});

// Cursor
const cursor = document.querySelector('.sniper-cursor');
const dot = document.querySelector('.sniper-dot');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px';
  dot.style.left = e.clientX + 'px'; dot.style.top = e.clientY + 'px';
});

// Diagnóstico
document.getElementById('btnDiagnostico').onclick = function() {
    document.getElementById('analysisForm').style.display = 'none';
    document.getElementById('speedRing').style.display = 'block';
    let p = 0;
    const interval = setInterval(() => {
        p++;
        document.getElementById('livePct').innerText = Math.floor(Math.random() * 99) + "%";
        if(p > 30) {
            clearInterval(interval);
            document.getElementById('speedRing').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
        }
    }, 100);
};
</script>
</body>
</html>
