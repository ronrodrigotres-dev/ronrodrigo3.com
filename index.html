<div class="radar-line radar1"></div>

<div class="content">

<div class="grid">

<div class="service" data-module="SEM">SEM</div>

<div class="service" data-module="TRANSFORMACION">TRANSFORMACION</div>

</div>

</div>

<script>

const API="https://ron3ia-api-819648047297.southamerica-west1.run.app";

const btn=document.getElementById("btn");
const input=document.getElementById("input");
const consoleBox=document.getElementById("console");
const score=document.getElementById("scoreDisplay");

function log(t){
consoleBox.textContent+="\n"+t;
consoleBox.scrollTop=9999;
}

async function run(mod){

log("> INIT "+mod);

try{

const res=await fetch(API+"/analizar-sitio",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
descripcion:input.value,
modulo:mod
})
});

const data=await res.json();

const final=Math.round(
(data.scores.seo+
data.scores.perf+
data.scores.cro+
data.scores.ads)/4
);

score.textContent=final;

log("> SCORE "+final);

}catch(e){

log("> FALLBACK ENGINE");

const fake=Math.floor(Math.random()*100);
score.textContent=fake;

}

}

btn.onclick=()=>run("AUDITORIA");

document.querySelectorAll(".service").forEach(el=>{
el.onclick=()=>run(el.dataset.module);
});

</script>
