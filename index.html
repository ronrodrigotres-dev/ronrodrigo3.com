<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RON3IA | Sistema Autónomo</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
    background:#050505;
    font-family:'JetBrains Mono', monospace;
    color:white;
    text-align:center;
    padding:40px;
}

.card{
    border:2px solid #ff3131;
    box-shadow:0 0 20px #ff0000;
    padding:30px;
    margin:auto;
    max-width:600px;
    background:#0a0a0a;
    border-radius:8px;
}

input{
    width:90%;
    padding:12px;
    margin:10px 0;
    background:black;
    border:1px solid #ff3131;
    color:white;
    text-align:center;
}

.score-gauge{
    width:160px;
    height:160px;
    border-radius:50%;
    background:conic-gradient(#ff3131 0%, #1a1a1a 0%);
    display:flex;
    align-items:center;
    justify-content:center;
    margin:30px auto;
    transition:background 1s ease;
}

.score-inner{
    width:120px;
    height:120px;
    border-radius:50%;
    background:black;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:26px;
    font-weight:bold;
    text-shadow:0 0 10px #ff0000;
}

.neon-button{
    position:relative;
    width:100%;
    padding:16px;
    margin-top:20px;
    border:2px solid #ff3131;
    background:#4a0000;
    color:white;
    font-weight:bold;
    cursor:pointer;
    overflow:hidden;
    box-shadow:0 0 10px #ff3131;
}

#BTN-glow{
    position:absolute;
    left:0;
    top:0;
    height:100%;
    width:0%;
    background:rgba(255,0,0,0.5);
    box-shadow:0 0 20px #ff0000;
}

#btn-text{
    position:relative;
    z-index:2;
}
</style>
</head>

</div>
