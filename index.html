<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RON3IA CORE | Sistema Autónomo</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
background:#050505;
font-family:'JetBrains Mono', monospace;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
border:2px solid #ff0000;
box-shadow:0 0 25px #ff0000;
padding:40px;
max-width:420px;
width:90%;
text-align:center;
border-radius:10px;
}

h1{
color:#ff0000;
letter-spacing:3px;
margin-bottom:10px;
}

.subtitle{
color:#777;
font-size:12px;
margin-bottom:30px;
}

.score{
width:150px;
height:150px;
border-radius:50%;
border:12px solid #222;
margin:20px auto;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
}

input{
width:100%;
background:#000;
border:1px solid #ff0000;
padding:12px;
margin-top:15px;
color:white;
outline:none;
}

button{
margin-top:20px;
width:100%;
padding:15px;
background:#ff0000;
border:none;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
box-shadow:0 0 15px #ff0000;
}

</style>

</head>

<body>

<div class="card">

<h1>RON3IA CORE</h1>
<div class="subtitle">SISTEMA AUTÓNOMO DE AUDITORÍA ESTRATÉGICA</div>

<div class="score">--</div>

<input type="email" placeholder="EMAIL CORPORATIVO">
<input type="text" placeholder="URL DEL SITIO (ej. empresa.com)">

<button>INICIAR DIAGNÓSTICO</button>

</div>

</body>
</html>
