<script>
async function ejecutarAuditoria(){
    const email = document.getElementById('email').value;
    const url = document.getElementById('url').value;
    const btnGlow = document.getElementById('BTN-glow');
    const btnText = document.getElementById('btn-text');
    const scoreNum = document.getElementById('score-number');
    const gauge = document.getElementById('gauge');

    if(!email || !url){
        alert("Email y URL requeridos.");
        return;
    }

    // Estado de Carga
    btnText.innerText = "SISTEMA PROCESANDO...";
    btnGlow.style.transition = "width 2s linear";
    btnGlow.style.width = "90%";

    try {
        const response = await fetch("https://ron3ia-api-819648047297.southamerica-west1.run.app/analizar-sitio", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({email: email, url: url})
        });

        const data = await response.json();

        // --- CORRECCIÓN AQUÍ ---
        if(data.status === "success") {
            const finalScore = data.health_score.score;
            
            // Éxito Visual
            btnGlow.style.transition = "width 0.3s ease";
            btnGlow.style.width = "100%";
            btnText.innerText = "DIAGNÓSTICO FINALIZADO";
            
            // Animación del Gauge Neón
            gauge.style.background = `conic-gradient(#ff3131 ${finalScore}%, #1a1a1a 0%)`;
            scoreNum.innerText = finalScore;

            console.log("Auditoría exitosa ID:", data.audit_id);
        } else {
            throw new Error("Error en respuesta de API");
        }

    } catch(error) {
        console.error("Fallo en el núcleo:", error);
        btnText.innerText = "ERROR DE CONEXIÓN";
        btnGlow.style.background = "rgba(255, 255, 0, 0.3)"; // Amarillo de advertencia
    }

    // Reset tras 3 segundos para permitir nueva consulta
    setTimeout(() => {
        btnText.innerText = "INICIAR DIAGNÓSTICO";
        btnGlow.style.width = "0%";
        btnGlow.style.background = "rgba(255,0,0,0.5)";
    }, 4000);
}
</script>
