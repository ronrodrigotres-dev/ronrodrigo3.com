<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RON3IA | CORE</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
    background:#050505;
    font-family:'JetBrains Mono', monospace;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.card{
    width:500px;
    background:#0a0a0a;
    border:2px solid #ff3131;
    box-shadow:0 0 25px rgba(255,0,0,0.6);
    padding:40px;
    border-radius:8px;
    text-align:center;
}

h1{
    color:#ff3131;
    letter-spacing:3px;
    font-size:18px;
    margin-bottom:30px;
}

.score-gauge{
    width:160px;
    height:160px;
    border-radius:50%;
    margin:0 auto 30px auto;
    background:conic-gradient(#ff3131 0%, #1a1a1a 0%);
    display:flex;
    align-items:center;
    justify-content:center;
    transition:1s ease;
}

.score-inner{
    width:120px;
    height:120px;
    background:#000;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    font-weight:bold;
    text-shadow:0 0 10px #ff0000;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    background:#000;
    border:1px solid #ff3131;
    color:#fff;
    text-align:center;
    outline:none;
}

.neon-button{
    position:relative;
    width:100%;
    padding:16px;
    border:2px solid #ff3131;
    background:#300000;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
    overflow:hidden;
    letter-spacing:2px;
}

.neon-button:hover{
    box-shadow:0 0 20px #ff0000;
}

#progress-bar{
    position:absolute;
    left:0;
    top:0;
    height:100%;
    width:0%;
    background:rgba(255,0,0,0.5);
    transition:width 0.2s linear;
    z-index:1;
}

#btn-text{
    position:relative;
    z-index:2;
}

.results{
    margin-top:20px;
    font-size:12px;
    text-align:left;
    display:none;
}

</style>
</head>
<body>

<div class="card">

    <h1>RON3IA CORE</h1>

    <div class="score-gauge" id="gauge">
        <div class="score-inner" id="score">--</div>
    </div>

    <input type="email" id="email" placeholder="EMAIL CORPORATIVO">
    <input type="text" id="url" placeholder="URL DEL SITIO">

    <button class="neon-button" onclick="ejecutarAuditoria()">
        <div id="progress-bar"></div>
        <span id="btn-text">INICIAR DIAGNÓSTICO</span>
    </button>

    <div class="results" id="results">
        <div id="metrics"></div>
    </div>

</div>

<script>

async function ejecutarAuditoria(){

    const email = document.getElementById('email').value;
    const url = document.getElementById('url').value;

    const progressBar = document.getElementById('progress-bar');
    const btnText = document.getElementById('btn-text');
    const gauge = document.getElementById('gauge');
    const score = document.getElementById('score');

    if(!email || !url){
        alert("Se requiere Email y URL.");
        return;
    }

    btnText.innerText = "PROCESANDO...";
    progressBar.style.width = "0%";

    let progress = 0;
    const interval = setInterval(()=>{
        progress += 4;
        progressBar.style.width = progress + "%";
        if(progress >= 100) clearInterval(interval);
    },80);

    try{

        const response = await fetch("https://ron3ia-api-819648047297.southamerica-west1.run.app/analizar-sitio",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({email:email,url:url})
        });

        const data = await response.json();

        if(data.status === "success"){

            const finalScore = data.health_score.score;

            gauge.style.background = `conic-gradient(#ff3131 ${finalScore}%, #1a1a1a 0%)`;
            score.innerText = finalScore;

            document.getElementById("results").style.display = "block";
            document.getElementById("metrics").innerHTML = `
                <p>SEO: ${data.metrics.seo}</p>
                <p>CRO: ${data.metrics.cro}</p>
                <p>ROI Proyectado: ${data.metrics.roi_proyectado}</p>
                <p style="font-size:10px;color:#777;margin-top:10px;">ID: ${data.audit_id}</p>
            `;

            btnText.innerText = "ANÁLISIS COMPLETADO";
        }

    }catch(e){
        btnText.innerText = "ERROR";
        console.error(e);
    }

}

</script>

</body>
</html>
