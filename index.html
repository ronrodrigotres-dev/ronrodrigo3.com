<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RON3IA | WAR ROOM</title>
    <style>
        :root {
            --neon: #ff3131;
            --bg: #050505;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            text-align: center;
            overflow-x: hidden;
        }

        /* --- VIDEO DE FONDO --- */
        #bg-video {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: -2;
            opacity: 0.3;
        }

        /* --- OVERLAY DE LÍNEAS DE MONITOR --- */
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%);
            background-size: 100% 4px;
            z-index: -1;
            pointer-events: none;
        }

        /* --- ANIMACIONES: VIBRACIÓN Y PARPADEO --- */
        @keyframes v-tremble {
            0%, 100% { transform: translate(0,0); }
            20% { transform: translate(-1.5px, 1.5px); }
            40% { transform: translate(-1.5px, -1.5px); }
            60% { transform: translate(1.5px, 1.5px); }
            80% { transform: translate(1.5px, -1.5px); }
        }

        @keyframes flicker-bin {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
            20%, 22%, 24%, 55% { opacity: 0.2; }
        }

        /* --- LOGO R3.PNG (Barras blancas + Glow rojo) --- */
        .title {
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: 12px;
            margin: 0;
            position: relative;
            /* Efecto de líneas blancas horizontales en las letras */
            background: linear-gradient(to bottom, #fff 50%, #bbb 50%);
            background-size: 100% 4px;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            /* El resplandor rojo de fondo */
            filter: drop-shadow(0 0 10px var(--neon)) drop-shadow(0 0 20px var(--neon));
            /* Vibración y parpadeo real */
            animation: v-tremble 0.1s infinite, flicker-bin 4s infinite steps(1);
        }

        .subtitle {
            color: var(--neon);
            font-size: 1rem;
            letter-spacing: 2px;
            margin: 20px 0;
            font-weight: bold;
        }

        /* --- SCORE CIRCLE --- */
        .score-circle {
            width: 180px; height: 180px;
            border-radius: 50%;
            border: 4px solid #222;
            border-top: 4px solid var(--neon);
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; font-weight: bold;
            margin: 20px auto;
            box-shadow: 0 0 20px rgba(255, 49, 49, 0.2);
            animation: v-tremble 0.2s infinite;
        }

        /* --- CONSOLA --- */
        .console-box {
            width: 100%; max-width: 400px;
            background: rgba(0,0,0,0.8);
            border: 1px solid #333;
            border-radius: 10px;
            padding: 20px;
            text-align: left;
            box-shadow: 0 0 30px rgba(255, 49, 49, 0.1);
        }

        .console-header { color: var(--neon); font-size: 0.8rem; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .dot { width: 8px; height: 8px; background: var(--neon); border-radius: 50%; box-shadow: 0 0 10px var(--neon); }

        textarea {
            width: 100%; height: 120px;
            background: #0a0a0a; border: 1px solid #222;
            color: #666; padding: 15px; font-family: inherit;
            resize: none; box-sizing: border-box; border-radius: 5px;
        }

        .btn-init {
            width: 100%; background: #400; color: white; border: none;
            padding: 15px; margin-top: 15px; font-weight: bold; cursor: pointer;
            letter-spacing: 2px;
        }
        .btn-init:hover { background: var(--neon); }

        /* --- DIFERENCIAL --- */
        .diff-box {
            margin-top: 60px; text-align: left; width: 100%; max-width: 400px;
            border: 1px solid #222; padding: 20px; border-radius: 10px;
        }
        .diff-box h3 { color: var(--neon); font-size: 0.9rem; letter-spacing: 3px; }
        .diff-list { list-style: none; padding: 0; font-size: 0.75rem; color: #aaa; }
        .diff-list li { margin-bottom: 15px; display: flex; align-items: flex-start; gap: 10px; }
        .diff-list li::before { content: "●"; color: var(--neon); font-size: 1rem; }

    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="vecteezy_dark-red-neon-steel-reverse-tunnel-with-shadows-vj-loop_74116401.mp4" type="video/mp4">
    </video>
    
    <div class="scanlines"></div>

    <h1 class="title">RON3IA</h1>
    <div class="subtitle">SISTEMA AUTÓNOMO DE OPTIMIZACIÓN FINANCIERA DIGITAL</div>

    <div class="score-circle">--/100</div>

    <div class="console-box">
        <div class="console-header"><div class="dot"></div> CONSOLA DE COMANDO ESTRATÉGICO</div>
        <textarea placeholder="Describe tu desafío..."></textarea>
        <button class="btn-init">INICIAR AUDITORÍA</button>
    </div>

    <div class="diff-box">
        <h3>DIFERENCIAL PURO</h3>
        <ul class="diff-list">
            <li>DIAGNÓSTICO AUTÓNOMO MULTI-IA</li>
            <li>SISTEMA EVOLUTIVO CON MEMORIA</li>
        </ul>
    </div>

</body>
</html>
