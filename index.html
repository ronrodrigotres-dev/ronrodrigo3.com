<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RON3IA - Sistema Autónomo</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    background:#000;
    font-family:'Orbitron',sans-serif;
    color:#fff;
    overflow-x:hidden;
}

/* BOOT */

.boot-screen{
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.progress-bar{
    width:260px;
    height:4px;
    background:#111;
    border:1px solid #ff0000;
}

.progress-fill{
    height:100%;
    width:0%;
    background:#ff0000;
    box-shadow:0 0 15px #ff0000;
}

/* HERO */

.hero{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    opacity:0;
    transition:opacity 1s ease;
    padding:20px;
}

.logo{
    font-size:clamp(42px,8vw,72px);
    font-weight:900;
    animation:glow 6s infinite;
}

@keyframes glow{
    0%{text-shadow:0 0 20px #ff0000}
    50%{text-shadow:0 0 60px #ff0000}
    100%{text-shadow:0 0 20px #ff0000}
}

.subtitle{
    margin-top:20px;
    letter-spacing:2px;
    color:#ff2a2a;
}

.cta-core{
    margin-top:40px;
    padding:15px 40px;
    border:2px solid #ff0000;
    color:#ff0000;
    background:transparent;
    letter-spacing:2px;
    cursor:pointer;
    animation:pulse 2s infinite;
    transition:.3s;
}

@keyframes pulse{
    0%{box-shadow:0 0 15px #ff0000}
    50%{box-shadow:0 0 50px #ff0000}
    100%{box-shadow:0 0 15px #ff0000}
}

.cta-core:hover{
    background:#ff0000;
    color:#000;
    transform:scale(1.08);
}

/* HOLO */

.holo-screen{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.96);
    display:none;
    flex-direction:column;
    padding:20px;
    overflow-y:auto;
    z-index:9998;
}

.holo-header{
    text-align:center;
    margin-bottom:20px;
    color:#ff0000;
    letter-spacing:3px;
}

.holo-close{
    position:absolute;
    right:20px;
    top:15px;
    cursor:pointer;
    font-size:20px;
}

.services-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}

.service-card{
    border:1px solid rgba(255,0,0,.4);
    padding:15px;
    cursor:pointer;
    transition:.3s;
}

.service-card:hover{
    box-shadow:0 0 25px #ff0000;
}

/* SUB PANEL */

.sub-panel{
    position:fixed;
    inset:0;
    background:#000;
    display:none;
    flex-direction:column;
    padding:20px;
    overflow-y:auto;
    z-index:10000;
}

.console-text{
    font-family:monospace;
    color:#ff0000;
    font-size:14px;
    white-space:pre-wrap;
    line-height:1.6;
}

/* SCORE */

.score-container{
    margin-top:30px;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.score-circle{
    transform:rotate(-90deg);
    filter:drop-shadow(0 0 15px #ff0000);
}

.score-text{
    margin-top:-115px;
    font-size:22px;
    color:#ff0000;
    text-shadow:0 0 15px #ff0000;
}

.score-text.high{
    animation:superGlow 1s infinite alternate;
}

@keyframes superGlow{
    from{text-shadow:0 0 15px #ff0000}
    to{text-shadow:0 0 40px #ff0000}
}

.back-btn{
    margin-top:30px;
    border:1px solid #ff0000;
    background:transparent;
    color:#ff0000;
    padding:10px;
    cursor:pointer;
}

/* PARTICLES */

.particle{
    position:fixed;
    width:2px;
    height:2px;
    background:#ff0000;
    box-shadow:0 0 8px #ff0000;
    animation:float 6s linear infinite;
}

@keyframes float{
    from{transform:translateY(100vh)}
    to{transform:translateY(-10vh)}
}
</style>
</head>

<body>

<div class="boot-screen" id="bootScreen">
    <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
    </div>
</div>

<section class="hero" id="hero">
    <div class="logo">RON3IA</div>
    <div class="subtitle">SISTEMA AUTÓNOMO ACTIVO</div>
    <button class="cta-core" id="diagnosticBtn">INICIAR DIAGNÓSTICO</button>
</section>

<script>
const boot = document.getElementById("bootScreen");
const hero = document.getElementById("hero");

if(!localStorage.getItem("booted")){
    let p=0;
    const fill=document.getElementById("progressFill");
    const int=setInterval(()=>{
        p+=3;
        fill.style.width=p+"%";
        if(p>=100){
            clearInterval(int);
            boot.style.display="none";
            hero.style.opacity="1";
            localStorage.setItem("booted","true");
        }
    },40);
}else{
    boot.style.display="none";
    hero.style.opacity="1";
}
</script>

</body>
</html>
