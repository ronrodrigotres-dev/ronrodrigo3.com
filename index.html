<audio id="tronSound" loop>
    <source src="tron-ambient.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("tronSound");

function activateSound() {
    audio.volume = 0.3; // volumen bajo elegante
    audio.play();
    document.removeEventListener("click", activateSound);
}

document.addEventListener("click", activateSound);
</script>
<audio id="logoPulseSound">
    <source src="pulse.mp3" type="audio/mpeg">
</audio>

<script>
const logo = document.querySelector(".logo");
const pulseSound = document.getElementById("logoPulseSound");

logo.addEventListener("mouseenter", () => {
    pulseSound.currentTime = 0;
    pulseSound.volume = 0.4;
    pulseSound.play();
});
</script>
